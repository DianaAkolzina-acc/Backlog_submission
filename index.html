const SUPABASE_URL  = "https://ksxnjqimgiibifdyssgr.supabase.co";

//

const WORKSTREAMS    = ["GBS","Controls/Engineering","IIP","BP&F","WSaaS","PMaaS","Maximo AMS","Cost Ecosystem","EHM","PMO"];

// ── SUPABASE ─────────────────────────────────────────────────────
function authH() {
  return {
    "Content-Type":  "application/json",
    "apikey":        SUPABASE_ANON,
    "Authorization": `Bearer ${currentSession ? currentSession.access_token : SUPABASE_ANON}`,
    "Prefer":        "return=representation",
  };
}
async function dbFetch() {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/tickets?order=created_at.desc`, { headers: authH() });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbInsert(ticket) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/tickets`, { method:"POST", headers:authH(), body:JSON.stringify(ticket) });
  if (!r.ok) throw new Error(await r.text());
  const d = await r.json(); return d[0];
}
async function dbUpdate(id, patch) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/tickets?id=eq.${id}`, { method:"PATCH", headers:authH(), body:JSON.stringify(patch) });
  if (!r.ok) throw new Error(await r.text());
  const d = await r.json(); return d[0];
}

const tS = { ...iS, resize:"vertical", padding:"8px 10px", lineHeight:1.5 };


// ── TICKET FORM ───────────────────────────────────────────────────
function runChecks(f) {
  const issues = [];
  const desc  = f.description  || '';
  const descL = desc.toLowerCase();
  const painL = (f.painPoints  || '').toLowerCase();
  const dataL = (f.dataSources || '').toLowerCase();
  const nameL = (f.name        || '').toLowerCase();
  const poc   = f.pointsOfContact || '';
  const pri   = parseInt(f.priority) || 0;
  const wc    = s => s.trim().split(/\s+/).filter(Boolean).length;
  const has   = (s, arr) => arr.some(w => s.includes(w));

  // ── Description ──────────────────────────────────────────────
  if (wc(desc) < 40)
    issues.push({ id:'desc_short',
      q:`Your description is only ${wc(desc)} words. Please expand: what exactly needs to be built, how will it work, and what does the end result look like?` });

  if (desc.split(/[.!?]+/).filter(p => p.trim().length > 10).length < 2)
    issues.push({ id:'desc_sentences',
      q:'Your description reads as a single sentence. Please break it into at least 2–3 clear points: (1) what to build, (2) how it works, (3) who benefits.' });

  if (has(descL, ['things','stuff','etc.','and so on','kind of','sort of','somehow','something like that','various things','some things']))
    issues.push({ id:'desc_vague',
      q:'Your description uses vague language ("things", "stuff", "kind of", "etc."). Please be specific — what are these processes or items exactly?' });

  if (!has(descL, ['user','team','person','people','staff','employee','analyst','manager','client','customer','who will','for the','used by','stakeholder']))
    issues.push({ id:'desc_users',
      q:'Who will use this solution? Please name the specific team(s) or role(s) who will interact with it day-to-day.' });

  if (!has(descL, ['result','outcome','benefit','saving','reduc','improv','faster','automat','replac','elimin','generat','produc','output','deliver','enable','allow']))
    issues.push({ id:'desc_outcome',
      q:'What is the expected outcome? What changes after this is built? (e.g. "reduces reporting time from 2 hours to 5 minutes", "eliminates manual data entry for the finance team")' });

  if (has(descL, ['tbd','n/a','to be determined','to be defined','will be added','will be decided','placeholder']))
    issues.push({ id:'desc_placeholder',
      q:'Your description contains placeholder text ("TBD", "N/A", etc.). Please replace these with the actual details — incomplete submissions are deprioritised.' });

  if (has(descL, [' ai ',' ml ','machine learning','llm','chatbot','automation']) &&
      !has(descL, ['chatbot','bot','classifier','predict','forecast','generat','summariz','extract','detect','recommend','translat','analyz','report','categor','rank','score','cluster','segment']))
    issues.push({ id:'desc_ai_type',
      q:'You mention AI/ML but the type of solution isn\'t clear. Is it a chatbot, predictive model, document summariser, anomaly detector, report generator, or classifier? Please specify.' });

  if (has(descL, ['note:','please note','fyi','as discussed','as per','as mentioned','see attached','refer to']))
    issues.push({ id:'desc_email_paste',
      q:'Your description looks like it may have been pasted from an email. Please rewrite it directly as a project request describing what needs to be built.' });

  // ── Name ─────────────────────────────────────────────────────
  if (wc(f.name || '') < 4)
    issues.push({ id:'name_short',
      q:'The request name is too brief. Please make it more descriptive — aim for 4–8 words that clearly identify what is being requested (e.g. "Automated sprint report generator for PMO").' });

  if (has(nameL, ['ai solution','ai tool','ai project','smart solution','intelligent system','automated system','automation tool','ai platform','digital transformation','innovation']) && wc(f.name||'') < 5)
    issues.push({ id:'name_buzzword',
      q:'The name uses generic buzzwords without describing what the tool actually does. Please rename it to reflect its specific function (e.g. "AI contract review for Legal team" not "AI solution").' });

  // ── Pain points ───────────────────────────────────────────────
  if (wc(f.painPoints || '') < 30)
    issues.push({ id:'pain_short',
      q:`The pain points section is only ${wc(f.painPoints||'')} words. Please describe the current problem in more detail: what breaks down, how often, and what are the consequences?` });

  if (!has(painL, ['hour','day','week','month','%','percent','cost','budget','revenue','error','manual','time','effort','resource','headcount','fte','delay','backlog','overtime']))
    issues.push({ id:'pain_impact',
      q:'Can you quantify the pain? E.g. "takes X hours per week", "X% error rate", "costs £X in manual effort", "delays reports by X days". Numbers make the business case far stronger.' });

  if (has(painL, ['inefficient','time-consuming','manual process','tedious','slow','laborious']) && wc(f.painPoints||'') < 50)
    issues.push({ id:'pain_vague',
      q:'You\'ve said the process is manual/time-consuming — can you be more specific? What exact steps are manual, how long do they take, and what goes wrong when done manually?' });

  // Overlap: description and pain points sharing too many words
  const dWds = new Set(descL.split(/\W+/).filter(w => w.length > 5));
  const pWds = new Set(painL.split(/\W+/).filter(w => w.length > 5));
  const overlap = [...dWds].filter(w => pWds.has(w)).length;
  if (dWds.size > 8 && pWds.size > 8 && overlap / Math.min(dWds.size, pWds.size) > 0.65)
    issues.push({ id:'pain_repeat',
      q:'Your pain points and description use very similar wording. Pain points = the problem; description = the solution. Please clearly separate these so reviewers can assess both independently.' });

  // ── Data sources ──────────────────────────────────────────────
  if (wc(f.dataSources || '') < 15)
    issues.push({ id:'data_short',
      q:'Please describe the data sources in more detail. Which specific systems, databases, or files will this solution read from or write to, and where are they hosted?' });

  if (has(dataL, ['database','system','files','data','excel','spreadsheet','email','document']) &&
      !has(dataL, ['sql','sap','salesforce','oracle','sharepoint','dynamics','servicenow','jira','powerbi','tableau','snowflake','azure','aws','api','warehouse','teams','power apps','.xlsx','.csv','sql server','postgres','mysql']))
    issues.push({ id:'data_generic',
      q:'Data sources are described generically ("database", "Excel", "system"). Please name the actual tools (e.g. "SAP PM module via BAPI", "SharePoint project tracker", "SQL Server reporting DB on Azure").' });

  if (has(dataL, ['employee data','personal data','hr data','payroll','salary','patient','client data','customer data','pii','names','addresses']) &&
      !has(dataL, ['gdpr','privacy','compliance','anonymis','pseudonymis','sensitive','consent','data protection','information security','ict approval','dpa']))
    issues.push({ id:'data_pii',
      q:'Your data sources appear to include personal or sensitive data. Have you considered GDPR/data privacy implications? Please note any data protection measures, approvals, or anonymisation steps in place.' });

  if (has(dataL, ['real-time','live','stream','event-driven','kafka','pubsub','websocket']) &&
      !has(dataL, ['latency','throughput','volume','rate','per second','per minute','frequency']))
    issues.push({ id:'data_realtime',
      q:'You mention real-time or streaming data. What is the expected data volume and frequency? (e.g. "~500 events/minute", "10 MB/hour") This is needed to size the solution correctly.' });

  // ── Priority ──────────────────────────────────────────────────
  if (pri >= 9)
    issues.push({ id:'priority_max',
      q:`You've set priority to ${pri}/10 — the highest level. What makes this critical right now? Please give a concrete reason (hard deadline, compliance requirement, client commitment, revenue at risk, executive escalation).` });

  if (pri >= 7 && wc(desc) < 80)
    issues.push({ id:'priority_high_short',
      q:`Priority ${pri}/10 is high, but the description is only ${wc(desc)} words. High-priority requests need thorough descriptions to justify fast-tracking. Please expand it significantly.` });

  if (pri >= 7 && !has(descL + painL, ['deadline','urgent','compliance','legal','regulat','revenue','client','contract','audit','breach','critical','blocking','escalat','sla','board','exec','regulatory','penalty','fine']))
    issues.push({ id:'priority_justification',
      q:`Priority is ${pri}/10 but no urgency driver is mentioned. What makes this high priority? (e.g. upcoming deadline, compliance risk, client commitment, revenue impact, exec pressure)` });

  if (pri <= 2 && has(descL + painL, ['urgent','critical','asap','deadline','blocking','immediately','emergency','time-sensitive','must have']))
    issues.push({ id:'priority_low_urgent',
      q:'Your description uses urgency language ("urgent", "critical", "deadline") but priority is set very low. Is the priority correct, or should it be higher?' });

  if (pri >= 8 && !has(descL + painL, ['by ','before ','quarter','q1','q2','q3','q4','jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec','2025','2026','deadline','sprint','release']))
    issues.push({ id:'priority_no_deadline',
      q:`Priority ${pri}/10 is marked high. Is there a specific deadline or target date driving this? If so, please state it — it helps with scheduling.` });

  // ── Access ────────────────────────────────────────────────────
  if ((f.access === 'External' || f.access === 'Both') &&
      !has(descL + painL, ['client','external','customer','vendor','partner','outside','third party','third-party','public','supplier','contractor']))
    issues.push({ id:'access_external',
      q:`You selected "${f.access}" access but the description doesn't mention external users. Who specifically outside Accenture will use this, and for what purpose?` });

  if (f.access === 'Both' && !has(descL, ['internal','external','both','different','separate','two','role','permission','access level']))
    issues.push({ id:'access_both',
      q:'You selected "Both" (internal and external). How do the two use cases differ? Do internal and external users see different data or have different permissions?' });

  // ── Points of contact ─────────────────────────────────────────
  if (wc(poc) < 2)
    issues.push({ id:'poc_short',
      q:'Please provide at least a name and role, or a team name. Who should the admin team contact with questions about this request?' });

  if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(poc.trim()))
    issues.push({ id:'poc_email',
      q:'The point of contact appears to be just an email address. Please provide a name and role/team instead (e.g. "Jane Smith, PMO Lead, GBS Controls").' });

  if (wc(poc) <= 2 && !has(poc.toLowerCase(), ['team','group','lead','manager','director','head','owner','analyst','engineer','admin','department','chapter']))
    issues.push({ id:'poc_no_role',
      q:'The point of contact is a name without a role or team. Please add their role so we know who to escalate to if they\'re unavailable (e.g. "Jane Smith, PMO Lead, GBS Controls").' });

  // ── Workstream alignment ──────────────────────────────────────
  const wsMap = {
    'GBS':                ['gbs','global business','shared service','gbs team'],
    'Controls/Engineering':['control','engineer','compliance','governance','risk','audit','quality'],
    'IIP':                ['iip','infrastructure','investment','programme'],
    'BP&F':               ['bp&f','bp and f','budget','planning','finance','forecast','financial'],
    'WSaaS':              ['wsaas','workspace','workplace','saas','tooling','collaboration'],
    'PMaaS':              ['pmaas','project management','pmo','programme management','delivery'],
    'Maximo AMS':         ['maximo','asset','maintenance','ams','facility','equipment'],
    'Cost Ecosystem':     ['cost','pricing','spend','expense','billing','invoice','commercial'],
    'EHM':                ['ehm','health','wellbeing','employee health','medical'],
    'PMO':                ['pmo','project','portfolio','programme office','delivery office'],
  };
  const wsKw = wsMap[f.workstream] || [];
  if (wsKw.length > 0 && !wsKw.some(w => (descL + painL).includes(w)))
    issues.push({ id:'workstream_mismatch',
      q:`You selected workstream "${f.workstream}" but the description doesn't clearly connect to it. Can you explain how this request fits within ${f.workstream}?` });

  return issues;
}

function TicketForm() {
  const empty = { name:"", description:"", priority:"", access:"", dataSources:"", painPoints:"", workstream:"", pointsOfContact:"" };
  const [form,    setForm]    = useState(empty);
  const [phase,   setPhase]   = useState("form");  // form | questionnaire | submitting | done
  const [loading, setLoading] = useState(false);
  const [err,     setErr]     = useState("");
  const [checks,  setChecks]  = useState([]);
  const [cAnswers,setCA]      = useState({});
  const activeForm = useRef(null);
  const set = k => v => setForm(f => ({...f,[k]:v}));

  function validate() {
    for (const k of Object.keys(empty))
      if (!form[k]?.toString().trim()) return `Please fill in: ${k.replace(/([A-Z])/g," $1").toLowerCase()}`;
    const p = parseInt(form.priority);
    if (isNaN(p)||p<1||p>10) return "Priority must be 1–10.";
    return null;
  }

  async function finalize(f) {
    try {
      await dbInsert({ ...f, priority:parseInt(f.priority), status:'pending_review', rank:null, effort:null, created_at:new Date().toISOString() });
    } catch(e) { alert("Database error: " + e.message); return false; }
    return true;
  }

  async function submit() {
    const e = validate(); if (e) { setErr(e); return; }
    setErr("");
    const failed = runChecks(form);
    if (failed.length > 0) { setChecks(failed); setCA({}); setPhase("questionnaire"); return; }
    setLoading(true); setPhase("submitting");
    await finalize(form);
    setPhase("done"); setLoading(false);
  }

  async function submitWithAnswers() {
    setLoading(true);
    const qa = checks.map(c => `Q: ${c.q}\nA: ${cAnswers[c.id]||''}`).join('\n\n');
    const enriched = { ...form, description: form.description + '\n\n[Clarifications provided]\n' + qa };
    activeForm.current = enriched;
    setPhase("submitting");
    await finalize(enriched);
    setPhase("done"); setLoading(false);
  }

  function reset() { setForm(empty); setPhase("form"); setErr(""); setChecks([]); setCA({}); activeForm.current=null; }

  // ── Done ──────────────────────────────────────────────────────
  if (phase === "done") return (
    <div style={{maxWidth:480,margin:"80px auto",textAlign:"center",padding:"0 1rem"}}>
      <div style={{width:56,height:56,borderRadius:"50%",background:"#EAF3DE",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:28,color:"#3B6D11"}}>✓</div>
      <h2 style={{fontSize:20,fontWeight:500,marginBottom:8}}>Request submitted</h2>
      <p style={{color:"#666",marginBottom:24}}>Your request is queued for review. The admin team will assess it and may follow up if more detail is needed.</p>
      <button className="primary" onClick={reset}>Submit another</button>
    </div>
  );

  // ── Submitting ────────────────────────────────────────────────
  if (phase === "submitting") return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"60vh",color:"#888",fontSize:14}}>
      Submitting…
    </div>
  );

  // ── Questionnaire ─────────────────────────────────────────────
  if (phase === "questionnaire") return (
    <div style={{maxWidth:640,margin:"40px auto",padding:"0 1rem 60px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
        <div style={{width:28,height:28,borderRadius:6,background:"#FAEEDA",display:"flex",alignItems:"center",justifyContent:"center"}}>💬</div>
        <span style={{fontWeight:500,fontSize:14}}>A few more details needed</span>
        <span style={{fontSize:12,color:"#888",marginLeft:4}}>({checks.length} question{checks.length!==1?"s":""})</span>
      </div>
      <div style={{background:"#FFF8E6",border:"0.5px solid #E8C96D",borderRadius:10,padding:"12px 16px",marginBottom:20,fontSize:13,color:"#7A5C00"}}>
        Your submission looks promising but needs a bit more context to be fast-tracked. Please answer the questions below — the more specific you are, the quicker it gets reviewed.
      </div>
      {checks.map((c,i) => (
        <div key={c.id} style={{background:"#fff",border:"0.5px solid #ddd",borderRadius:12,padding:"1rem 1.25rem",marginBottom:12}}>
          <label style={{fontSize:13,fontWeight:500,display:"block",marginBottom:8,lineHeight:1.5}}>
            <span style={{color:"#aaa",marginRight:6,fontWeight:400}}>{i+1}.</span>{c.q}
          </label>
          <textarea style={tS} rows={3}
            value={cAnswers[c.id]||""}
            onChange={e=>setCA(a=>({...a,[c.id]:e.target.value}))}
            placeholder="Please be specific…"/>
        </div>
      ))}
      <div style={{display:"flex",gap:8,marginTop:8}}>
        <button className="primary"
          onClick={submitWithAnswers}
          disabled={loading||checks.some(c=>!cAnswers[c.id]?.trim())}
          style={{flex:1,padding:"10px"}}>
          {loading?"Submitting…":"Submit with answers →"}
        </button>
        <button onClick={()=>setPhase("form")} style={{padding:"10px 16px"}}>← Edit form</button>
      </div>
    </div>
  );

  // ── Form ──────────────────────────────────────────────────────
  return (
    <div style={{maxWidth:640,margin:"40px auto",padding:"0 1rem 60px"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
        <div style={{width:32,height:32,borderRadius:8,background:"#EEEDFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🎫</div>
        <h1 style={{fontSize:20,fontWeight:500}}>New request</h1>
      </div>
      <div style={{background:"#fff",border:"0.5px solid #ddd",borderRadius:12,padding:"1.5rem",marginBottom:14}}>
        <p style={{fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:16}}>Project details</p>
        <Field label="Request name" required help="4–8 words, describe what is being built">
          <input style={iS} value={form.name} onChange={e=>set("name")(e.target.value)} placeholder="e.g. PMO AI agent for sprint reporting"/>
        </Field>
        <Field label="Description" required help="What needs to be built, how it works, and who benefits">
          <textarea style={tS} rows={5} value={form.description} onChange={e=>set("description")(e.target.value)} placeholder="Describe the solution, not the problem. Include: what to build, how it will work, who will use it, and the expected outcome."/>
        </Field>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Priority" required help="1 = lowest, 10 = highest">
            <input style={iS} type="number" min={1} max={10} value={form.priority} onChange={e=>set("priority")(e.target.value)} placeholder="1–10"/>
          </Field>
          <Field label="Access" required>
            <select style={iS} value={form.access} onChange={e=>set("access")(e.target.value)}>
              <option value="">Select…</option>
              {ACCESS_OPTIONS.map(o=><option key={o}>{o}</option>)}
            </select>
          </Field>
        </div>
        <Field label="Workstream" required>
          <select style={iS} value={form.workstream} onChange={e=>set("workstream")(e.target.value)}>
            <option value="">Select…</option>
            {WORKSTREAMS.map(o=><option key={o}>{o}</option>)}
          </select>
        </Field>
      </div>
      <div style={{background:"#fff",border:"0.5px solid #ddd",borderRadius:12,padding:"1.5rem",marginBottom:14}}>
        <p style={{fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:16}}>Context & ownership</p>
        <Field label="Data sources" required help="Name the specific systems, databases, or files involved">
          <textarea style={tS} rows={2} value={form.dataSources} onChange={e=>set("dataSources")(e.target.value)} placeholder="e.g. SAP PM module, SharePoint project tracker, SQL Server reporting DB"/>
        </Field>
        <Field label="Pain points solved" required help="Describe the problem — quantify where possible (hours/week, error rate, cost)">
          <textarea style={tS} rows={3} value={form.painPoints} onChange={e=>set("painPoints")(e.target.value)} placeholder="What breaks down, how often, and what are the consequences? Include numbers if possible."/>
        </Field>
        <Field label="Points of contact" required help="Name + role + team (e.g. Jane Smith, PMO Lead, GBS Controls)">
          <input style={iS} value={form.pointsOfContact} onChange={e=>set("pointsOfContact")(e.target.value)} placeholder="Who owns this request and can answer questions about it?"/>
        </Field>
      </div>
      {err && <p style={{color:"#D85A30",fontSize:13,marginBottom:12}}>{err}</p>}
      <button className="primary" onClick={submit} disabled={loading} style={{width:"100%",padding:"10px"}}>
        {loading?"Checking…":"Submit for review →"}
      </button>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [step,    setStep]    = useState('email');
  const [email,   setEmail]   = useState('');
  const [code,    setCode]    = useState('');
  const [msg,     setMsg]     = useState('');
  const [err,     setErr]     = useState('');
  const [loading, setLoading] = useState(false);

  async function sendCode() {
    const e = email.trim().toLowerCase();
    if (!e.endsWith('@accenture.com')) { setErr('Only @accenture.com addresses are allowed.'); return; }
    setLoading(true); setErr('');
    const { error } = await supabaseClient.auth.signInWithOtp({ email: e });
    if (error) { setErr('Could not send code. Please try again.'); }
    else { setStep('code'); setMsg(`Code sent to ${e}`); }
    setLoading(false);
  }

  async function verifyCode() {
    setLoading(true); setErr('');
    const e = email.trim().toLowerCase();
    const t = code.trim();
    let lastErr = null;
    for (const type of ['email', 'recovery', 'magiclink']) {
      const { error } = await supabaseClient.auth.verifyOtp({ email: e, token: t, type });
      if (!error) {
        for (let i = 0; i < 20; i++) {
          const { data: { session } } = await supabaseClient.auth.getSession();
          if (session) { onLogin(session); return; }
          await new Promise(r => setTimeout(r, 500));
        }
        setErr('Verification timed out — please request a new code.');
        setLoading(false);
        return;
      }
      lastErr = error;
    }
    setErr(lastErr?.message || 'Invalid or expired code.');
    setLoading(false);
  }

  const cardStyle = { background:'#fff', border:'0.5px solid #ddd', borderRadius:12, padding:'1.5rem' };
  return (
    <div style={{ maxWidth:400, margin:'80px auto', padding:'0 1rem' }}>
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:20 }}>
        <div style={{ width:32, height:32, borderRadius:8, background:'#EEEDFE', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>🎫</div>
        <h1 style={{ fontSize:20, fontWeight:500 }}>GBS AI Request Portal</h1>
      </div>
      <div style={cardStyle}>
        {step === 'email' ? (
          <>
            <Field label="Accenture email" required help="@accenture.com addresses only">
              <input style={iS} type="email" value={email} onChange={e=>setEmail(e.target.value)}
                placeholder="you@accenture.com" autoComplete="email"
                onKeyDown={e=>e.key==='Enter'&&sendCode()} />
            </Field>
            {err && <p style={{ color:'#D85A30', fontSize:13, marginBottom:12 }}>{err}</p>}
            <button className="primary" onClick={sendCode} disabled={loading||!email} style={{ width:'100%' }}>
              {loading ? 'Sending…' : 'Send sign-in code →'}
            </button>
          </>
        ) : (
          <>
            <p style={{ fontSize:13, color:'#666', marginBottom:16 }}>{msg}</p>
            <Field label="Sign-in code" required>
              <input style={{ ...iS, fontSize:24, letterSpacing:6, textAlign:'center' }}
                type="text" inputMode="numeric" value={code} onChange={e=>setCode(e.target.value)}
                placeholder="········" autoComplete="one-time-code"
                onKeyDown={e=>e.key==='Enter'&&verifyCode()} />
            </Field>
            {err && <p style={{ color:'#D85A30', fontSize:13, marginBottom:12 }}>{err}</p>}
            <button className="primary" onClick={verifyCode} disabled={loading||code.length<4} style={{ width:'100%' }}>
              {loading ? 'Verifying…' : 'Sign in →'}
            </button>
            <button onClick={()=>{ setStep('email'); setCode(''); setErr(''); }}
              style={{ width:'100%', marginTop:8, background:'none', border:'none', color:'#888', fontSize:13, cursor:'pointer' }}>
              Use a different email
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ── EDIT FORM ─────────────────────────────────────────────────────

  return (
    <div style={{marginTop:16,paddingTop:16,borderTop:"0.5px solid #eee"}}>
      <p style={{fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:14}}>Edit ticket</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:4}}>
        <Field label="Request name" required>
          <input style={iS} value={ticket.name||""} onChange={e=>set("name")(e.target.value)}/>
        </Field>
        <Field label="Workstream">
          <select style={iS} value={ticket.workstream||""} onChange={e=>set("workstream")(e.target.value)}>
            <option value="">Select…</option>{WORKSTREAMS.map(o=><option key={o}>{o}</option>)}
          </select>
        </Field>
        <Field label="Priority (1–10)">

        </Field>
        <Field label="Effort (admin)">
          <select style={iS} value={ticket.effort||""} onChange={e=>set("effort")(e.target.value)}>
            <option value="">Select…</option>{EFFORT_OPTIONS.map(o=><option key={o}>{o}</option>)}
          </select>
        </Field>
        <Field label="Status">
          <select style={iS} value={ticket.status||""} onChange={e=>set("status")(e.target.value)}>
            {Object.entries(STATUS_META).map(([v,{label}])=><option key={v} value={v}>{label}</option>)}
          </select>
        </Field>

        <textarea style={tS} rows={3} value={ticket.description||""} onChange={e=>set("description")(e.target.value)}/>

      <Field label="Pain points solved">
        <textarea style={tS} rows={2} value={ticket.painPoints||ticket.pain_points||""} onChange={e=>{set("painPoints")(e.target.value);set("pain_points")(e.target.value);}}/>
      </Field>
      <div style={{display:"flex",gap:8,marginTop:4}}>

        <button onClick={onCancel}>Cancel</button>

// ── ADMIN BOARD ───────────────────────────────────────────────────
function AdminBoard({ adminUser, onLogout }) {
  const [tickets, setTickets]   = useState([]);
  const [loading, setLoading]   = useState(true);
  const [dbError, setDbError]   = useState("");
  const [selected,setSelected]  = useState(null);
  const [editing, setEditing]   = useState(null);
  const [filter,  setFilter]    = useState("all");
  const [statusFilter, setStatusFilter] = useState("active");  // active | pending | all
  const dragging = useRef(null);

  useEffect(() => { refresh(); }, []);

  async function refresh() {
    setLoading(true);
    try { const d = await dbFetch(); setTickets(d); setDbError(""); }
    catch(e) { setDbError("Cannot connect to database. Check SUPABASE_URL and SUPABASE_ANON in the config at the top of index.html."); }
    setLoading(false);
  }

  async function persist(id, patch) {
    try {
      await dbUpdate(id, patch);
      setTickets(ts=>ts.map(t=>t.id===id?{...t,...patch}:t));
    } catch(e) { alert("Save failed: "+e.message); }
  }

  async function saveEdit(t) { await persist(t.id, t); setEditing(null); setSelected(null); }

  function onDrop(toId) {
    const fromId = dragging.current; if (!fromId||fromId===toId) return;
    const vis = getVisible();
    const ids  = vis.map(t=>t.id);
    const reordered = [...ids];
    reordered.splice(reordered.indexOf(fromId),1);
    reordered.splice(reordered.indexOf(toId),0,fromId);
    reordered.forEach((id,i)=>persist(id,{rank:i+1,status:"prioritized"}));
    setTickets(ts=>ts.map(t=>{const r=reordered.indexOf(t.id);return r===-1?t:{...t,rank:r+1,status:"prioritized"};}));
    dragging.current = null;
  }

  function getVisible() {
    return tickets
      .filter(t => {
        if (statusFilter === "active")  return t.status==="approved"||t.status==="prioritized";
        if (statusFilter === "pending") return t.status==="pending_review"||t.status==="needs_info";
        return true;
      })
      .filter(t => filter==="all"||t.workstream===filter)
      .sort((a,b) => {
        if (a.rank!==null&&b.rank!==null) return a.rank-b.rank;
        if (a.rank!==null) return -1; if (b.rank!==null) return 1;
        return new Date(b.created_at)-new Date(a.created_at);
      });
  }

  const visible    = getVisible();
  const workstreams = ["all",...Array.from(new Set(tickets.map(t=>t.workstream).filter(Boolean)))];
  const pendingCount = tickets.filter(t=>t.status==="pending_review"||t.status==="needs_info").length;

  return (
    <div style={{maxWidth:960,margin:"0 auto",padding:"32px 1rem 60px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:500,marginBottom:2}}>Prioritisation board</h1>
          <p style={{color:"#888",fontSize:13}}>{adminUser}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={refresh} style={{fontSize:13,padding:"6px 12px"}}>↺ Refresh</button>
          <button onClick={onLogout} style={{fontSize:13,padding:"6px 12px"}}>Sign out</button>
        </div>
      </div>

      {dbError && (
        <div style={{background:"#FAECE7",border:"0.5px solid #F5C4B5",borderRadius:10,padding:"12px 16px",marginBottom:20,color:"#993C1D",fontSize:13}}>
          ⚠️ {dbError}
        </div>
      )}

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:24}}>
        {[
          ["Total",      tickets.length],
          ["Approved",   tickets.filter(t=>t.status==="approved"||t.status==="prioritized").length],
          ["Ranked",     tickets.filter(t=>t.rank!==null).length],
          ["Pending review", pendingCount],
          ["Workstreams",new Set(tickets.map(t=>t.workstream).filter(Boolean)).size],
        ].map(([l,v])=>(
          <div key={l} style={{background:"#fff",border:"0.5px solid #ddd",borderRadius:10,padding:"12px 14px"}}>
            <p style={{fontSize:12,color:"#888",marginBottom:4}}>{l}</p>
            <p style={{fontSize:22,fontWeight:500,margin:0,color:l==="Pending review"&&v>0?"#854F0B":undefined}}>{v}</p>
          </div>
        ))}
      </div>

      {/* Status filter */}
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {[["active","Active"],["pending","Pending review"+( pendingCount>0?` (${pendingCount})`:""  )],["all","All"]].map(([v,l])=>(
          <button key={v} onClick={()=>setStatusFilter(v)} style={{fontSize:12,padding:"4px 12px",background:statusFilter===v?"#EEEDFE":"#fff",color:statusFilter===v?"#534AB7":"inherit",border:statusFilter===v?"0.5px solid #AFA9EC":"0.5px solid #ddd"}}>{l}</button>
        ))}
      </div>

      {/* Workstream filter */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>
        {workstreams.map(w=>(
          <button key={w} onClick={()=>setFilter(w)} style={{fontSize:12,padding:"4px 12px",background:filter===w?"#f1efe8":"#fff",color:"inherit",border:filter===w?"0.5px solid #ccc":"0.5px solid #ddd"}}>
            {w==="all"?"All":w}
          </button>
        ))}
      </div>

      {loading && <p style={{color:"#888",textAlign:"center",padding:"40px 0"}}>Loading…</p>}
      {!loading&&visible.length===0&&!dbError && (
        <div style={{textAlign:"center",padding:"60px 20px",color:"#aaa"}}>
          <p style={{fontSize:28,marginBottom:8}}>📭</p>
          <p>No tickets in this view.</p>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {visible.map(t=>(
          <div key={t.id}
            draggable={t.status==="approved"||t.status==="prioritized"}
            onDragStart={()=>dragging.current=t.id}
            onDragOver={e=>e.preventDefault()}
            onDrop={()=>onDrop(t.id)}
            style={{background:"#fff",border:"0.5px solid #ddd",borderRadius:12,padding:"14px 16px",cursor:t.status==="approved"||t.status==="prioritized"?"grab":"default"}}>

            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:18,color:"#ccc",flexShrink:0}}>⠿</span>
              <input type="number"
                value={t.rank??""}
                onChange={e=>persist(t.id,{rank:e.target.value===""?null:parseInt(e.target.value),status:"prioritized"})}
                placeholder="—" min={1} onClick={e=>e.stopPropagation()}
                style={{width:44,textAlign:"center",padding:"3px 4px",fontSize:13,fontWeight:500}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:2}}>
                  <span style={{fontWeight:500,fontSize:14}}>{t.name}</span>
                  <Badge status={t.status}/>
                  {t.workstream && <span style={{fontSize:11,background:"#f1efe8",padding:"2px 8px",borderRadius:20,color:"#666"}}>{t.workstream}</span>}
                </div>
                <p style={{fontSize:12,color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",margin:0}}>{t.description}</p>
              </div>
              <div style={{display:"flex",gap:14,flexShrink:0,alignItems:"center"}}>
                <div style={{textAlign:"right"}}>
                  <p style={{fontSize:11,color:"#888",margin:"0 0 1px"}}>Priority</p>
                  <p style={{fontSize:15,fontWeight:500,margin:0}}>{t.priority}/10</p>
                </div>
                <div style={{textAlign:"right"}}>
                  <p style={{fontSize:11,color:"#888",margin:"0 0 1px"}}>Effort</p>
                  <p style={{fontSize:12,margin:0,color:t.effort?"inherit":"#ccc"}}>{t.effort?.split(" ")[0]||"TBD"}</p>
                </div>
                <button style={{fontSize:12,padding:"4px 10px"}} onClick={()=>{setEditing(null);setSelected(selected?.id===t.id?null:t);}}>
                  {selected?.id===t.id&&!editing?"Close":"View"}
                </button>
                <button className="primary" style={{fontSize:12,padding:"4px 10px"}} onClick={e=>{e.stopPropagation();setSelected(null);setEditing(editing?.id===t.id?null:{...t});}}>
                  {editing?.id===t.id?"Cancel":"Edit"}
                </button>
              </div>
            </div>

            {selected?.id===t.id&&!editing&&(
              <div style={{marginTop:16,paddingTop:16,borderTop:"0.5px solid #eee"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 24px",fontSize:13,marginBottom:12}}>
                  {[["Access",t.access],["Workstream",t.workstream],["Effort (admin)",t.effort||"Not yet assessed"],["Priority",`${t.priority}/10`],["Points of contact",t.pointsOfContact||t.points_of_contact],["Submitted",new Date(t.created_at).toLocaleDateString()]].map(([k,v])=>(
                    <div key={k}>
                      <p style={{fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 0 1px"}}>{k}</p>
                      <p style={{fontWeight:500,margin:0}}>{v||"—"}</p>
                    </div>
                  ))}
                </div>
                {[["Data sources",t.dataSources||t.data_sources],["Pain points solved",t.painPoints||t.pain_points],["Description",t.description]].map(([k,v])=>(
                  <div key={k} style={{marginBottom:10}}>
                    <p style={{fontSize:11,color:"#888",textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 0 2px"}}>{k}</p>
                    <p style={{fontSize:13,lineHeight:1.6,margin:0}}>{v||"—"}</p>
                  </div>
                ))}
              </div>
            )}
            {editing?.id===t.id&&<EditForm ticket={editing} onChange={setEditing} onSave={saveEdit} onCancel={()=>setEditing(null)}/>}
          </div>
        ))}
      </div>
      {visible.length>0&&(statusFilter==="active")&&<p style={{fontSize:12,color:"#aaa",textAlign:"center",marginTop:20}}>Drag to reorder · type a rank number · changes sync to Supabase</p>}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────
function App() {
  const [session,     setSession]     = useState(null);
  const [isAdmin,     setIsAdmin]     = useState(false);
  const [authLoading, setAuthLoading] = useState(true);
  const [view,        setView]        = useState('main'); // main | form

  useEffect(() => {
    supabaseClient.auth.onAuthStateChange((event, s) => {
      if (event === 'SIGNED_OUT') {
        currentSession = null;
        setSession(null);
        setIsAdmin(false);
        setView('main');
      }
    });
    supabaseClient.auth.getSession().then(({ data: { session: s } }) => {
      if (s) initSession(s);
      else setAuthLoading(false);
    });
  }, []);

  async function initSession(sess) {
    currentSession = sess;
    let admin = false;
    try {
      const { data } = await supabaseClient.from('user_roles').select('role').eq('user_id', sess.user.id).maybeSingle();
      admin = data?.role === 'admin';
    } catch(e) {}
    setIsAdmin(admin);
    setSession(sess);
    setAuthLoading(false);
  }

  if (authLoading) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', color:'#888', fontSize:14 }}>
      Loading…
    </div>
  );

  if (!session) return <LoginScreen onLogin={initSession} />;

  const navbar = (
    <div style={{ borderBottom:'0.5px solid #e5e5e5', padding:'10px 1rem', background:'#fff', display:'flex', alignItems:'center', gap:8 }}>
      {isAdmin && view === 'form' && (
        <button onClick={()=>setView('main')} style={{ fontSize:13, padding:'4px 10px' }}>← Board</button>
      )}
      <div style={{ flex:1 }} />
      <span style={{ fontSize:12, color:'#888' }}>{session.user.email}</span>
      {isAdmin && view === 'main' && (
        <button onClick={()=>setView('form')} style={{ fontSize:13, padding:'4px 10px' }}>+ Submit request</button>
      )}
      <button onClick={()=>supabaseClient.auth.signOut()} style={{ fontSize:13, padding:'4px 10px' }}>Sign out</button>
    </div>
  );

  if (isAdmin && view === 'main') return (
    <>
      {navbar}
      <AdminBoard adminUser={session.user.email} onLogout={()=>supabaseClient.auth.signOut()} />
    </>
  );

  return (
    <>
      {navbar}
      <TicketForm />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
